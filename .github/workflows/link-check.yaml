name: Link Checker

# =======================
# Website Link Validation
# =======================
# Purpose: Downloads the latest built site and checks all links (internal + external)
# Triggers: Weekly on Mondays at 01:30 UTC or manual dispatch
# Reports: Creates a GitHub issue with label "link-check" when broken links are found
# Config: See .lychee.toml for exclusion patterns and request settings

on:
  schedule:
    # Runs at 01:30 UTC every Monday
    - cron: '30 1 * * 1'
  workflow_dispatch:

permissions:
  contents: read
  issues: write
  actions: read

concurrency:
  group: link-check-${{ github.ref }}
  cancel-in-progress: true

jobs:
  link-check:
    name: Check Links
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Download latest build artifact
        uses: dawidd6/action-download-artifact@07ab29fd4a977ae4d2b275087cf67563dfdf0295
        with:
          workflow: deploy.yaml
          name: forrt-website-.*
          name_is_regexp: true
          path: /tmp/site
          github_token: ${{ secrets.GITHUB_TOKEN }}
          search_artifacts: true
          if_no_artifact_found: fail

      - name: Run lychee link checker
        id: lychee
        uses: lycheeverse/lychee-action@v2
        with:
          args: "--config .lychee.toml --base-url https://forrt.org /tmp/site"
          output: /tmp/lychee/out.md
          fail: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Separate 403 errors into collapsed section
        if: steps.lychee.outputs.exit_code != 0
        run: |
          python3 << 'PYEOF'
          import re

          with open("/tmp/lychee/out.md") as f:
              content = f.read()

          # Split lines, separate 403 entries from the rest
          lines = content.split("\n")
          main_lines = []
          forbidden_lines = []
          current_header = None

          for line in lines:
              # Track section headers (### Errors in ...)
              if line.startswith("### Errors in "):
                  current_header = line
                  continue
              if re.match(r"^\* \[403\]", line):
                  if current_header:
                      forbidden_lines.append(current_header)
                      current_header = None
                  forbidden_lines.append(line)
              else:
                  if current_header:
                      main_lines.append(current_header)
                      current_header = None
                  main_lines.append(line)

          # Rebuild the output
          output = "\n".join(main_lines).rstrip()

          if forbidden_lines:
              output += "\n\n<details>\n<summary>403 Forbidden errors (likely bot-blocking, not broken links)</summary>\n\n"
              output += "These sites block automated requests. The links may still be valid.\n\n"
              output += "\n".join(forbidden_lines)
              output += "\n\n</details>\n"

          with open("/tmp/lychee/out.md", "w") as f:
              f.write(output)
          PYEOF

      - name: Find publisher URLs that should use doi.org
        id: doi-check
        run: |
          # Search source markdown files (excluding glossary, which is auto-generated)
          # for direct publisher URLs that should use https://doi.org/ instead.
          # This covers both URLs with visible DOIs and those using publisher-specific
          # identifiers (e.g. ScienceDirect PII) where the DOI should be looked up.
          PUBLISHERS='(journals\.sagepub|tandfonline|psycnet\.apa|onlinelibrary\.wiley|link\.springer|academic\.oup|sciencedirect|jstor\.org|journals\.lww|royalsocietypublishing)\.(com|org)'
          MATCHES=$(grep -rn --include='*.md' -E \
            "https?://[^ ]*${PUBLISHERS}/[^ ]*(doi/|article|fulltext)" \
            content/ --exclude-dir=content/glossary || true)
          if [ -n "$MATCHES" ]; then
            {
              echo ""
              echo "## Publisher URLs that should use doi.org"
              echo ""
              echo "The following links point directly to publisher websites instead of using"
              echo "\`https://doi.org/{DOI}\` format. Publishers often block automated requests,"
              echo "making these URLs uncheckable. Please replace them with doi.org links."
              echo "If the DOI is not visible in the URL, look it up on https://search.crossref.org"
              echo ""
              echo '```'
              echo "$MATCHES"
              echo '```'
            } >> /tmp/lychee/out.md
            echo "found=true" >> "$GITHUB_OUTPUT"
          else
            echo "found=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Create issue from lychee output
        if: steps.lychee.outputs.exit_code != 0 || steps.doi-check.outputs.found == 'true'
        uses: peter-evans/create-issue-from-file@v5
        with:
          title: "Link Checker Report"
          content-filepath: /tmp/lychee/out.md
          labels: link-check
          token: ${{ secrets.GITHUB_TOKEN }}
