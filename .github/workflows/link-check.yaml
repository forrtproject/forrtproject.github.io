name: Link Checker

# =======================
# Website Link Validation
# =======================
# Purpose: Downloads the latest built site and checks all links (internal + external)
# Triggers: Weekly on Mondays at 01:30 UTC or manual dispatch
# Reports: Updates the existing open "link-check"-labeled issue (or creates one if none exists)
# Config: See .lychee.toml for exclusion patterns and request settings

on:
  schedule:
    # Runs at 01:30 UTC every Monday
    - cron: '30 1 * * 1'
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

permissions:
  contents: read
  issues: write
  actions: read

concurrency:
  group: link-check-${{ github.ref }}
  cancel-in-progress: true

jobs:
  link-check:
    name: Check Links
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Download latest build artifact
        uses: dawidd6/action-download-artifact@07ab29fd4a977ae4d2b275087cf67563dfdf0295
        with:
          workflow: deploy.yaml
          name: forrt-website-.*
          name_is_regexp: true
          path: /tmp/site
          github_token: ${{ secrets.GITHUB_TOKEN }}
          search_artifacts: true
          if_no_artifact_found: fail

      - name: Run lychee link checker
        id: lychee
        uses: lycheeverse/lychee-action@v2
        with:
          args: "--config .lychee.toml --base-url https://forrt.org /tmp/site"
          output: /tmp/lychee/out.md
          fail: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Process lychee output
        if: steps.lychee.outputs.exit_code != 0
        run: |
          python3 << 'PYEOF'
          import re

          with open("/tmp/lychee/out.md") as f:
              content = f.read()

          lines = content.split("\n")

          # Keep the summary table (everything before "## Errors per input")
          summary_lines = []
          error_lines = []
          in_errors = False
          for line in lines:
              if line.startswith("## Errors per input"):
                  in_errors = True
                  continue
              if in_errors:
                  error_lines.append(line)
              else:
                  summary_lines.append(line)

          # Parse errors, tracking which pages each URL appears on
          # url -> {"status": str, "pages": [str]}
          url_info = {}
          main_errors = {}    # non-403
          forbidden_errors = {}  # 403
          current_page = ""

          for line in error_lines:
              # Track section headers (### Errors in /tmp/site/.../index.html)
              page_match = re.match(r"^### Errors in /tmp/site/[^/]+/(.+)", line)
              if page_match:
                  # Convert file path to URL path
                  path = page_match.group(1)
                  path = re.sub(r"/index\.html$", "/", path)
                  current_page = f"/{path}"
                  continue

              m = re.match(r"^\* \[(\w+)\] <([^>]+)>", line)
              if not m:
                  continue
              status, url = m.group(1), m.group(2)

              target = forbidden_errors if status == "403" else main_errors
              if url not in target:
                  target[url] = {"status": status, "pages": []}
              if current_page and current_page not in target[url]["pages"]:
                  target[url]["pages"].append(current_page)

          # Build output
          output = "\n".join(summary_lines).rstrip()
          output += "\n\n## Broken links\n\n"

          if main_errors:
              for url, info in main_errors.items():
                  pages = info["pages"]
                  page_str = f" (in {pages[0]})" if len(pages) == 1 else f" (in {len(pages)} pages)"
                  output += f"* [{info['status']}] <{url}>{page_str}\n"
          else:
              output += "No broken links found (excluding 403s).\n"

          if forbidden_errors:
              output += f"\n<details>\n<summary>403 Forbidden ({len(forbidden_errors)} URLs — likely bot-blocking, not broken)</summary>\n\n"
              output += "These sites block automated requests. The links may still be valid.\n"
              output += "Showing first 100 — see workflow logs for full list.\n\n"
              for i, (url, info) in enumerate(forbidden_errors.items()):
                  if i >= 100:
                      output += f"\n*... and {len(forbidden_errors) - 100} more*"
                      break
                  output += f"* <{url}>\n"
              output += "\n</details>\n"

          with open("/tmp/lychee/out.md", "w") as f:
              f.write(output)
          PYEOF

      - name: Validate DOI links via the DOI Handle API
        id: doi-validate
        run: |
          mkdir -p /tmp/lychee
          python3 << 'PYEOF'
          import json, os, re, sys, time, urllib.error, urllib.parse, urllib.request
          from collections import defaultdict
          from concurrent.futures import ThreadPoolExecutor, as_completed
          from pathlib import Path

          SITE_ROOT = Path("/tmp/site")
          # DOI body: any non-whitespace char except quotes, angle brackets, backslash.
          # Parens are allowed because SICI-style DOIs (e.g. 10.1016/0277-9536(95)00127-S)
          # legitimately contain balanced parens — we strip unbalanced trailing ones below.
          DOI_RE = re.compile(r'https?://(?:dx\.)?doi\.org/(10\.[^\s"\'<>\\]+)', re.I)
          TRAIL = '.,;:]}>"\''

          def balance(s):
              """Strip trailing ')' / ']' if they are unbalanced (i.e. enclosing punctuation)."""
              while s and s[-1] in ')]':
                  opener = '(' if s[-1] == ')' else '['
                  if s.count(opener) < s.count(s[-1]):
                      s = s[:-1]
                  else:
                      break
              return s

          # doi -> set of source pages
          doi_pages = defaultdict(set)
          for html in SITE_ROOT.rglob("*.html"):
              try:
                  text = html.read_text(errors="ignore")
              except Exception:
                  continue
              # Strip the artifact-name dir (/tmp/site/<artifact>/<path>) -> /<path>
              rel_parts = html.relative_to(SITE_ROOT).parts[1:]
              page = "/" + "/".join(rel_parts)
              page = re.sub(r"/index\.html$", "/", page)
              for m in DOI_RE.finditer(text):
                  doi = m.group(1).rstrip(TRAIL)
                  doi = balance(doi)
                  doi = doi.rstrip(TRAIL)
                  if doi:
                      doi_pages[doi.lower()].add(page)

          if not doi_pages:
              print("No DOIs found in site")
              with open(os.environ["GITHUB_OUTPUT"], "a") as gh:
                  gh.write("found=false\n")
              sys.exit(0)

          print(f"Validating {len(doi_pages)} unique DOIs via the DOI Handle API...")

          # The Handle API is registry-agnostic — works for Crossref, DataCite,
          # mEDRA, JaLC, etc. responseCode 1 = handle found, 100 = not registered.
          # https://www.doi.org/factsheets/DOIProxy.html
          headers = {
              "User-Agent": "forrt-link-checker/1.0 (+https://forrt.org; mailto:info@forrt.org)",
          }

          def check(doi, retries=3):
              # DOIs in HTML are sometimes URL-encoded (e.g. %2F for /, %28 for ().
              # Decode first to avoid double-encoding when we hand it to the API.
              clean = urllib.parse.unquote(doi)
              url = "https://doi.org/api/handles/" + urllib.parse.quote(clean, safe="/")
              delay = 1.0
              for attempt in range(retries):
                  req = urllib.request.Request(url, headers=headers)
                  try:
                      with urllib.request.urlopen(req, timeout=20) as r:
                          data = json.load(r)
                          return doi, data.get("responseCode"), None
                  except urllib.error.HTTPError as e:
                      if e.code in (429, 500, 502, 503, 504) and attempt < retries - 1:
                          time.sleep(delay)
                          delay *= 2
                          continue
                      # 404 from the proxy means the DOI is not registered.
                      if e.code == 404:
                          return doi, 100, None
                      return doi, None, f"HTTP {e.code}"
                  except Exception as e:
                      if attempt < retries - 1:
                          time.sleep(delay)
                          delay *= 2
                          continue
                      return doi, None, str(e)
              return doi, None, "exhausted retries"

          broken = {}
          transient = []
          with ThreadPoolExecutor(max_workers=6) as pool:
              futures = {pool.submit(check, d): d for d in sorted(doi_pages)}
              for fut in as_completed(futures):
                  doi, code, err = fut.result()
                  if code == 1:
                      pass
                  elif code == 100:
                      broken[doi] = sorted(doi_pages[doi])
                  else:
                      transient.append((doi, err or code))

          if transient:
              print(f"  ({len(transient)} DOIs returned transient errors - treating as valid)")

          if broken:
              with open("/tmp/lychee/out.md", "a") as f:
                  f.write(f"\n## Broken DOIs ({len(broken)} not registered)\n\n")
                  f.write("These DOIs are not registered with any DOI agency (Crossref, DataCite, etc.) per the DOI Handle System — they likely contain a typo, were withdrawn, or were never minted.\n\n")
                  for doi in sorted(broken):
                      pages = broken[doi]
                      page_str = f" (in {pages[0]})" if len(pages) == 1 else f" (in {len(pages)} pages)"
                      f.write(f"* <https://doi.org/{doi}>{page_str}\n")
              with open(os.environ["GITHUB_OUTPUT"], "a") as gh:
                  gh.write("found=true\n")
              print(f"Found {len(broken)} broken DOIs")
          else:
              with open(os.environ["GITHUB_OUTPUT"], "a") as gh:
                  gh.write("found=false\n")
              print(f"All {len(doi_pages)} DOIs valid")
          PYEOF

      - name: Find publisher URLs that should use doi.org
        id: doi-check
        run: |
          # Search source markdown files (excluding glossary, which is auto-generated)
          # for direct publisher URLs that should use https://doi.org/ instead.
          PUBLISHERS='(journals\.sagepub|tandfonline|psycnet\.apa|onlinelibrary\.wiley|link\.springer|academic\.oup|sciencedirect|jstor\.org|journals\.lww|royalsocietypublishing)\.(com|org)'
          # Extract just file:line and the URL itself (not full line content)
          MATCHES=$(grep -rno --include='*.md' -E \
            "https?://[^ )\"']*(${PUBLISHERS})/[^ )\"']*(doi/|article|fulltext)[^ )\"']*" \
            content/ --exclude-dir=content/glossary | sort -u || true)
          if [ -n "$MATCHES" ]; then
            COUNT=$(echo "$MATCHES" | wc -l)
            {
              echo ""
              echo "## Publisher URLs that should use doi.org ($COUNT found)"
              echo ""
              echo "The following links point directly to publisher websites instead of using"
              echo "\`https://doi.org/{DOI}\` format. Publishers often block automated requests,"
              echo "making these URLs uncheckable. Please replace them with doi.org links."
              echo "If the DOI is not visible in the URL, look it up on https://search.crossref.org"
              echo ""
              echo '```'
              echo "$MATCHES"
              echo '```'
            } >> /tmp/lychee/out.md
            echo "found=true" >> "$GITHUB_OUTPUT"
          else
            echo "found=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Create or update Link Checker Report issue
        if: steps.lychee.outputs.exit_code != 0 || steps.doi-check.outputs.found == 'true' || steps.doi-validate.outputs.found == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_REPO: ${{ github.repository }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          set -euo pipefail
          TITLE="Link Checker Report"
          BODY_FILE=/tmp/lychee/out.md
          EXISTING=$(gh issue list --label link-check --state open --limit 1 --json number --jq '.[0].number // empty')
          if [ -n "$EXISTING" ]; then
            echo "Updating existing issue #$EXISTING"
            gh issue edit "$EXISTING" --body-file "$BODY_FILE"
            gh issue comment "$EXISTING" --body "Report refreshed by [workflow run]($RUN_URL)."
          else
            echo "No open link-check issue found; creating a new one"
            gh issue create --title "$TITLE" --body-file "$BODY_FILE" --label link-check
          fi
