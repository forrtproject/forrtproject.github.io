name: Link Checker

# =======================
# Website Link Validation
# =======================
# Purpose: Downloads the latest built site and checks all links (internal + external)
# Triggers: Weekly on Mondays at 01:30 UTC or manual dispatch
# Reports: Creates a GitHub issue with label "link-check" when broken links are found
# Config: See .lychee.toml for exclusion patterns and request settings

on:
  schedule:
    # Runs at 01:30 UTC every Monday
    - cron: '30 1 * * 1'
  workflow_dispatch:

permissions:
  contents: read
  issues: write
  actions: read

concurrency:
  group: link-check-${{ github.ref }}
  cancel-in-progress: true

jobs:
  link-check:
    name: Check Links
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Download latest build artifact
        uses: dawidd6/action-download-artifact@07ab29fd4a977ae4d2b275087cf67563dfdf0295
        with:
          workflow: deploy.yaml
          name: forrt-website-.*
          name_is_regexp: true
          path: /tmp/site
          github_token: ${{ secrets.GITHUB_TOKEN }}
          search_artifacts: true
          if_no_artifact_found: fail

      - name: Run lychee link checker
        id: lychee
        uses: lycheeverse/lychee-action@v2
        with:
          args: "--config .lychee.toml --base-url https://forrt.org /tmp/site"
          output: /tmp/lychee/out.md
          fail: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Find publisher URLs that should use doi.org
        id: doi-check
        run: |
          # Search source markdown files (excluding glossary, which is auto-generated)
          # for publisher URLs that contain DOIs and should use doi.org instead
          MATCHES=$(grep -rn --include='*.md' -E \
            'https?://[^ ]*(journals\.sagepub|tandfonline|psycnet\.apa|onlinelibrary\.wiley|link\.springer|academic\.oup)\.(com|org)[^ ]*/?(doi/|article/)(abs/|full/|pdf/)?10\.[0-9]{4,}' \
            content/ --exclude-dir=content/glossary || true)
          if [ -n "$MATCHES" ]; then
            {
              echo "## Publisher URLs that should use doi.org"
              echo ""
              echo "The following links use publisher-specific URLs instead of \`https://doi.org/\` format."
              echo "Using doi.org URLs allows the link checker to verify that DOIs are valid."
              echo "Publishers often block automated requests, making their URLs uncheckable."
              echo ""
              echo '```'
              echo "$MATCHES"
              echo '```'
            } >> /tmp/lychee/out.md
            echo "found=true" >> "$GITHUB_OUTPUT"
          else
            echo "found=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Create issue from lychee output
        if: steps.lychee.outputs.exit_code != 0 || steps.doi-check.outputs.found == 'true'
        uses: peter-evans/create-issue-from-file@v5
        with:
          title: "Link Checker Report"
          content-filepath: /tmp/lychee/out.md
          labels: link-check
          token: ${{ secrets.GITHUB_TOKEN }}
