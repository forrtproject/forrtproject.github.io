name: Cleanup Branches

on:
  schedule:
    - cron: '0 0 * * 0' # Run every Sunday at midnight
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Dry run (do not delete)'
        required: false
        type: boolean
        default: false

# Workflow-level concurrency to queue cleanup operations (wait instead of cancel)
concurrency:
  group: branch-cleanup
  cancel-in-progress: false

permissions:
  contents: write
  pull-requests: read

jobs:
  cleanup-staging:
    name: Cleanup Staging Aggregate Branches
    runs-on: ubuntu-latest
    timeout-minutes: 10  # Prevent blocking the queue
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Configure Git
        run: |
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git config --global user.name "github-actions[bot]"

      - name: Delete old staging branches
        env:
          DRY_RUN: ${{ inputs.dry_run }}
        run: |
          echo "Fetching all branches..."
          git fetch --all --prune

          echo "Listing staging-aggregate branches..."
          # Get branches matching pattern, sort by committer date (descending), skip first 5
          # Using git for-each-ref for more reliable remote branch listing (aligns with staging-aggregate.yaml)
          BRANCHES_TO_DELETE=$(git for-each-ref --format='%(refname:short)' --sort=-committerdate 'refs/remotes/origin/staging-aggregate-*' | tail -n +6 | sed 's#origin/##')
          
          if [ -z "$BRANCHES_TO_DELETE" ]; then
            echo "No old staging branches to delete."
            exit 0
          fi

          echo "Found branches to delete:"
          echo "$BRANCHES_TO_DELETE"

          for branch in $BRANCHES_TO_DELETE; do
            branch=$(echo "$branch" | xargs) # trim whitespace
            if [ "$DRY_RUN" = "true" ]; then
              echo "[DRY RUN] Would delete: $branch"
            else
              echo "Deleting: $branch"
              git push origin --delete "$branch" || echo "Failed to delete $branch"
            fi
          done

  cleanup-merged:
    name: Cleanup Merged Branches
    runs-on: ubuntu-latest
    timeout-minutes: 10  # Prevent blocking the queue
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Configure Git
        run: |
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git config --global user.name "github-actions[bot]"

      - name: Delete merged branches
        env:
          DRY_RUN: ${{ inputs.dry_run }}
        run: |
          echo "Fetching all branches..."
          git fetch --all --prune --tags

          # Define protected branches
          PROTECTED_BRANCHES="master|main|staging|production|gh-pages"

          echo "Finding merged branches..."
          # List remote branches merged into origin/master, exclude HEAD and fully matching protected branches
          MERGED_BRANCHES=$(git branch -r --merged origin/master | grep -vE "HEAD|origin/($PROTECTED_BRANCHES)$" | sed 's/origin\///')

          if [ -z "$MERGED_BRANCHES" ]; then
            echo "No merged branches to delete."
            exit 0
          fi

          echo "Found merged branches to delete:"
          echo "$MERGED_BRANCHES"

          for branch in $MERGED_BRANCHES; do
            branch=$(echo "$branch" | xargs)
            if [ "$DRY_RUN" = "true" ]; then
              echo "[DRY RUN] Would delete: $branch"
            else
              echo "Deleting: $branch"
              git push origin --delete "$branch" || echo "Failed to delete $branch"
            fi
          done

  cleanup-stale:
    name: Cleanup Stale Branches
    runs-on: ubuntu-latest
    timeout-minutes: 20  # Prevent blocking the queue
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Configure Git
        run: |
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git config --global user.name "github-actions[bot]"

      - name: Delete stale branches
        env:
          DRY_RUN: ${{ inputs.dry_run }}
          MONTHS_THRESHOLD: 6
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          echo "Fetching all branches..."
          git fetch --all --prune

          PROTECTED_BRANCHES="master|main|staging|production|gh-pages"
          
          # Calculate threshold date (6 months ago)
          THRESHOLD_DATE=$(date -d "-$MONTHS_THRESHOLD months" +%s)
          echo "Threshold date: $(date -d "@$THRESHOLD_DATE")"

          echo "Checking for stale branches..."
          
          # Collect branches to delete first (avoid stdin consumption issues with git push in loop)
          BRANCHES_TO_DELETE=""
          
          # Iterate over all remote branches, excluding protected and staging-aggregate branches
          while read -r branch; do
            branch=$(echo "$branch" | xargs) # trim whitespace
            clean_branch_name=${branch#origin/}
            
            # Skip staging-aggregate branches (handled by cleanup-staging job)
            if [[ "$clean_branch_name" == staging-aggregate-* ]]; then
              echo "Skipping $clean_branch_name (staging-aggregate branch)"
              continue
            fi
            
            # Get last commit date for the branch
            last_commit_date=$(git log -1 --format=%ct "$branch")
            
            # Check if branch has open PR
            open_pr_count=$(gh pr list -H "$clean_branch_name" --state open --json number | jq '. | length')
            
            if [ "$open_pr_count" -gt 0 ]; then
              echo "Skipping $clean_branch_name (Has open PR)"
              continue
            fi
            
            if [ "$last_commit_date" -lt "$THRESHOLD_DATE" ]; then
              echo "Branch '$clean_branch_name' is stale (Last commit: $(date -d "@$last_commit_date"))"
              if [ -z "$BRANCHES_TO_DELETE" ]; then
                BRANCHES_TO_DELETE="$clean_branch_name"
              else
                BRANCHES_TO_DELETE="$BRANCHES_TO_DELETE"$'\n'"$clean_branch_name"
              fi
            fi
          done < <(git branch -r | grep -vE "HEAD|origin/($PROTECTED_BRANCHES)$")
          
          # Now delete the collected branches
          if [ -z "$BRANCHES_TO_DELETE" ]; then
            echo "No stale branches to delete."
          else
            echo "Found stale branches to delete:"
            echo "$BRANCHES_TO_DELETE"
            
            while IFS= read -r branch; do
              if [ "$DRY_RUN" = "true" ]; then
                echo "[DRY RUN] Would delete: $branch"
              else
                echo "Deleting: $branch"
                git push origin --delete "$branch" || echo "Failed to delete $branch"
              fi
            done <<< "$BRANCHES_TO_DELETE"
          fi
