{{ $data := resources.Get "data/summaries.json" }}
{{ $summaries := $data | transform.Unmarshal }}

<nav id="TableOfContents" class="nav flex-column">
  <ul>
    {{ range $summaries }}
    {{ if in .Title "⌺" }}
    <li class="nav-item"><a href="#{{.Id}}" class="nav-link">{{ .Title }}</a></li>
    {{end}}
    {{end}}
  </ul>
</nav>
