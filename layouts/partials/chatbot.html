<style>
  #just-os-widget {
    position: fixed;
    top: 100px;
    right: 20px;
    bottom: auto;
    left: auto;
    z-index: 9999;
    display: flex;
    flex-direction: column;
    align-items: flex-end;
    font-family: sans-serif;
  }

  #just-os-btn {
    background: none;
    border: none;
    cursor: pointer;
    padding: 0;
    transition: transform 0.3s ease;
    position: relative;
    outline: none;
    z-index: 2;
  }

  #just-os-btn:hover {
    transform: scale(1.05);
  }

  #just-os-img {
    width: 80px;
    height: auto;
    display: block;
    filter: drop-shadow(0 4px 6px rgba(0, 0, 0, 0.1));
  }

  #just-os-bubble {
    position: absolute;
    right: 90px;
    left: auto;
    top: 20px;
    background: white;
    color: #333;
    padding: 8px 12px;
    border-radius: 20px;
    border: 2px solid #333;
    white-space: nowrap;
    font-size: 0.9rem;
    font-weight: bold;
    box-shadow: 0 4px 10px rgba(0, 0, 0, 0.1);
    opacity: 0;
    transform: translateX(-10px);
    transition: all 0.3s ease;
    pointer-events: none;
  }

  #just-os-btn:hover #just-os-bubble {
    opacity: 1;
    transform: translateX(0);
  }

  .bubble-visible {
    opacity: 1 !important;
    transform: translateX(0) !important;
  }

  /* The chat window — default: docked right panel */
  #just-os-window {
    display: none;
    position: fixed;
    top: 0;
    right: 0;
    bottom: 0;
    left: auto;
    width: 33vw;
    min-width: 320px;
    background: white;
    border-left: 2px solid #333;
    box-shadow: -4px 0 20px rgba(0, 0, 0, 0.15);
    overflow: hidden;
    flex-direction: column;
    z-index: 10000;
  }

  /* Floating mode — centered, resizable */
  #just-os-window.floating {
    top: 5vh;
    right: auto;
    bottom: auto;
    left: 50%;
    transform: translateX(-50%);
    width: 60vw;
    height: 80vh;
    min-height: 300px;
    border: 2px solid #333;
    border-radius: 12px;
    box-shadow: 0 8px 30px rgba(0, 0, 0, 0.25);
  }

  /* Custom resize handle (bottom-left corner, floating only) */
  .just-os-resize-handle {
    display: none;
    position: absolute;
    bottom: 0;
    left: 0;
    width: 18px;
    height: 18px;
    cursor: nesw-resize;
    z-index: 10;
  }

  #just-os-window.floating .just-os-resize-handle {
    display: block;
  }

  .just-os-resize-handle::after {
    content: '';
    position: absolute;
    bottom: 3px;
    left: 3px;
    width: 10px;
    height: 10px;
    border-left: 2px solid #bbb;
    border-bottom: 2px solid #bbb;
  }

  .just-os-resize-handle:hover::after {
    border-color: #888;
  }

  .chat-header {
    background: #f8f9fa;
    padding: 10px 15px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    border-bottom: 1px solid #eee;
    gap: 8px;
  }

  .chat-header span {
    font-weight: bold;
    color: #0d3c74;
  }

  .close-btn {
    background: none;
    border: none;
    font-size: 1.5rem;
    line-height: 1;
    cursor: pointer;
    color: #666;
  }

  .close-btn:hover {
    color: #000;
  }

  /* ---- Chat UI styles ---- */
  .just-os-messages {
    flex: 1;
    overflow-y: auto;
    padding: 12px;
    display: flex;
    flex-direction: column;
    gap: 10px;
    min-height: 0;
  }

  .just-os-msg {
    max-width: 85%;
    position: relative;
  }

  .just-os-msg.user {
    align-self: flex-end;
  }

  .just-os-msg.bot {
    align-self: flex-start;
  }

  .just-os-bubble-content {
    padding: 8px 12px;
    border-radius: 12px;
    line-height: 1.45;
    font-size: 0.9rem;
    word-wrap: break-word;
    overflow-wrap: break-word;
  }

  .just-os-msg.user .just-os-bubble-content {
    background: #0d3c74;
    color: white;
    border-bottom-right-radius: 4px;
  }

  .just-os-msg.bot .just-os-bubble-content {
    background: #f0f2f5;
    color: #1a1a1a;
    border-bottom-left-radius: 4px;
  }

  .just-os-msg.bot .just-os-bubble-content p {
    margin: 0 0 8px;
  }

  .just-os-msg.bot .just-os-bubble-content p:last-child {
    margin-bottom: 0;
  }

  .just-os-msg.bot .just-os-bubble-content a {
    color: #0d3c74;
    text-decoration: underline;
  }

  /* Inline citation links rendered as plain text */
  .just-os-msg.bot .just-os-bubble-content a.reference-link {
    color: inherit;
    text-decoration: none;
    pointer-events: none;
    cursor: default;
    font-size: 0.85em;
  }

  .just-os-copy-btn {
    display: block;
    margin-top: 4px;
    margin-left: auto;
    background: none;
    border: none;
    cursor: pointer;
    font-size: 0.85rem;
    padding: 2px 4px;
    color: #aaa;
    border-radius: 4px;
    opacity: 0;
    transition: opacity 0.2s;
    line-height: 1;
  }

  .just-os-msg.bot:hover .just-os-copy-btn {
    opacity: 1;
  }

  .just-os-copy-btn:hover {
    color: #555;
  }

  /* References list below bot message */
  .just-os-references {
    margin-top: 8px;
    padding: 8px 10px;
    background: #f8f9fb;
    border-radius: 8px;
    border: 1px solid #e8eaed;
    font-size: 0.8rem;
    line-height: 1.4;
  }

  .just-os-references summary {
    cursor: pointer;
    font-weight: 600;
    color: #555;
    font-size: 0.8rem;
    user-select: none;
  }

  .just-os-references ol {
    margin: 6px 0 0;
    padding-left: 18px;
  }

  .just-os-references li {
    margin-bottom: 4px;
    color: #555;
  }

  .just-os-references li a {
    color: #0d3c74;
    text-decoration: none;
  }

  .just-os-references li a:hover {
    text-decoration: underline;
  }

  .just-os-typing {
    display: none;
    padding: 6px 12px;
    color: #888;
    font-size: 0.85rem;
    font-style: italic;
  }

  .just-os-error {
    color: #c0392b;
    font-style: italic;
  }

  .just-os-input-area {
    display: flex;
    align-items: flex-end;
    gap: 8px;
    padding: 10px 12px;
    border-top: 1px solid #eee;
    background: #fafafa;
  }

  .just-os-input {
    flex: 1;
    border: 1px solid #ccc;
    border-radius: 8px;
    padding: 8px 10px;
    font-size: 0.9rem;
    resize: none;
    max-height: 120px;
    font-family: inherit;
    line-height: 1.4;
  }

  .just-os-input:focus {
    outline: none;
    border-color: #0d3c74;
  }

  .just-os-send-btn {
    background: #0d3c74;
    color: white;
    border: none;
    border-radius: 8px;
    padding: 8px 14px;
    cursor: pointer;
    font-size: 0.9rem;
    white-space: nowrap;
    flex-shrink: 0;
  }

  .just-os-send-btn:hover {
    background: #0a2f5c;
  }

  .just-os-send-btn:disabled {
    opacity: 0.5;
    cursor: not-allowed;
  }

  /* New Chat button */
  .just-os-new-chat-btn {
    background: none;
    border: none;
    cursor: pointer;
    font-size: 0.8rem;
    color: #666;
    padding: 4px 8px;
    border-radius: 4px;
  }

  .just-os-new-chat-btn:hover {
    background: #eee;
    color: #333;
  }

  /* Responsive */
  @media (max-width: 1100px) {
    #just-os-widget {
      top: 150px;
    }
  }

  @media (max-width: 768px) {
    #just-os-widget {
      top: 80px;
    }

    #just-os-window {
      width: 100vw;
    }

    #just-os-window.floating {
      width: 95vw;
      height: 80vh;
      top: 5vh;
    }
  }
</style>

{{ if ne .RelPermalink "/just_os_chatbot/" }}
<div id="just-os-widget">

  <!-- Toggle Button -->
  <button id="just-os-btn" onclick="toggleJustOS()" aria-label="Open Chatbot">
    <img id="just-os-img" src="/img/just_os_icon.webp" alt="Chat with us">
    <div id="just-os-bubble">
      How can I help you?
    </div>
  </button>

  <!-- Chat Window -->
  <div id="just-os-window">
    <div class="chat-header">
      <span>JUST-OS</span>

      <button type="button" class="just-os-new-chat-btn" onclick="newJustOSChat()" title="New Chat">New Chat</button>

      <button type="button" id="just-os-float-btn" class="close-btn" style="margin-left: auto; font-size: 1.1rem;"
        onclick="toggleJustOSFloat()" aria-label="Pop out" title="Pop out">⤢</button>

      <button class="close-btn" onclick="toggleJustOS()" aria-label="Close">&times;</button>
    </div>

    <div class="just-os-messages"></div>

    <div class="just-os-input-area">
      <textarea class="just-os-input" rows="1" placeholder="Ask a question…" aria-label="Chat message"></textarea>
      <button class="just-os-send-btn" type="button">Send</button>
    </div>
    <div class="just-os-resize-handle"></div>
  </div>

</div>
{{ end }}

<script src="/js/just-os-chat.js"></script>
