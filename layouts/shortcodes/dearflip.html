<!-- Flipbook using 3D FlipBook with local files -->
<div id="flipbook-{{ .Get "id" | default "default" }}" style="width: 100%; height: {{ if .Get "height" }}{{ .Get "height" }}{{ else }}800px{{ end }}; margin: 20px 0;"></div>

<script src="/lib/3d-flipbook/js/jquery.min.js"></script>
<script src="/lib/3d-flipbook/js/html2canvas.min.js"></script>
<script src="/lib/3d-flipbook/js/three.min.js"></script>
<script src="/lib/3d-flipbook/js/pdf.min.js"></script>

<script>
// Configure PDF.js worker and API
if (typeof window.pdfjsDistBuildPdf !== 'undefined') {
  console.log("✓ PDF.js loaded");
  window.pdfjsLib = window.pdfjsDistBuildPdf;
  if (window.pdfjsLib && window.pdfjsLib.GlobalWorkerOptions) {
    window.pdfjsLib.GlobalWorkerOptions.workerSrc = '/lib/3d-flipbook/js/pdf.worker.js';
    console.log("✓ PDF.js worker configured");
  }
} else {
  console.warn("⚠ PDF.js not found at window.pdfjsDistBuildPdf");
}
</script>

<script>
// Test: Log when each library loads
window._libsLoaded = {
  jquery: false,
  three: false,
  pdf: false,
  canvas: false,
  flipbook: false
};

var originalLog = console.log;
var libLoaded = false;
console.log = function() {
  originalLog.apply(console, arguments);
};

// Check library availability immediately
setTimeout(function() {
  window._libsLoaded.jquery = typeof jQuery !== 'undefined';
  window._libsLoaded.three = typeof THREE !== 'undefined';
  window._libsLoaded.pdf = typeof pdfjsLib !== 'undefined';
  window._libsLoaded.canvas = typeof html2canvas !== 'undefined';
  window._libsLoaded.flipbook = typeof jQuery !== 'undefined' && jQuery.fn && jQuery.fn.FlipBook;

  console.log("📖 Libraries loaded:", window._libsLoaded);
  console.log("📖 window.pdfjsDistBuildPdf =", typeof window.pdfjsDistBuildPdf);
  console.log("📖 jQuery.fn.FlipBook =", typeof (jQuery && jQuery.fn && jQuery.fn.FlipBook));
}, 1000);
</script>

<script src="/lib/3d-flipbook/js/3dflipbook.min.js"></script>

<script>
(function() {
  function attemptInit() {
    if (typeof jQuery === 'undefined') {
      console.log("⏳ Waiting for jQuery...");
      setTimeout(attemptInit, 1000);
      return;
    }

    if (!jQuery.fn.FlipBook) {
      console.log("⏳ Waiting for jQuery.fn.FlipBook... Available at window:", Object.keys(window).filter(k => k.includes('flip') || k.includes('Flip')).slice(0, 5));
      setTimeout(attemptInit, 1000);
      return;
    }

    const containerId = "flipbook-{{ .Get "id" | default "default" }}";
    const pdfUrl = "{{ .Get "pdf" | default "/files/FORRT_booklet.pdf" }}";

    console.log("✓ FlipBook plugin ready, initializing with PDF:", pdfUrl);

    try {
      jQuery('#' + containerId).FlipBook({
        pdf: pdfUrl,
        template: {
          html: '/lib/3d-flipbook/templates/default-book-view.html',
          styles: ['/lib/3d-flipbook/css/short-black-book-view.css'],
          links: [{rel: 'stylesheet', href: '/lib/3d-flipbook/css/font-awesome.min.css'}],
          script: '/lib/3d-flipbook/js/default-book-view.js'
        }
      });
      console.log("✓ 3D FlipBook initialized!");
    } catch (e) {
      console.error("❌ Error:", e.message);
      document.getElementById(containerId).innerHTML = '<p>Error: ' + e.message + '</p>';
    }
  }

  console.log("📖 Starting FlipBook init routine...");
  setTimeout(attemptInit, 500);
})();
</script>
